<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: skyblue;
    color: skyblue;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container-box {
    background: gold;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 20px skyblue;
    width: 350px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.form-control, .form-select {
    background: white;
    color: gold;
    border: 1px solid gold;
}

.btn-gold {
    background: gold;
    color: black;
    font-weight: bold;
}

.btn-gold:hover {
    background: goldenrod;
}

.result {
    margin-top: 15px;
    font-size: 18px;
    text-align: center;
}
</style>

</head>

<body>

<div class="container-box">
    <h2>Currency Converter</h2>

    <!-- FIXED ID -->
    <input type="number" id="amount" class="form-control mb-3" placeholder="Enter Amount">

    <!-- DROPDOWNS ADDED -->
    <select id="fromCurrency" class="form-select mb-3"></select>
    <select id="toCurrency" class="form-select mb-3"></select>

    <button class="btn btn-gold w-100" onclick="convert()">Convert</button>

    <div class="result" id="result"></div>
</div>

<script>

// Currency data
const currencies = {
    USD: { name: "US Dollar", rate: 1 },
    AED: { name: "UAE Dirham", rate: 3.67 },
    INR: { name: "Indian Rupee", rate: 83.1 },
    EUR: { name: "Euro", rate: 0.92 },
    GBP: { name: "British Pound Sterling", rate: 0.78 },
    JPY: { name: "Japanese Yen", rate: 150.5 },
    AUD: { name: "Australian Dollar", rate: 1.52 },
    CAD: { name: "Canadian Dollar", rate: 1.36 },
    CHF: { name: "Swiss Franc", rate: 0.89 },
    CNY: { name: "Chinese Yuan", rate: 7.2 },
    SAR: { name: "Saudi Riyal", rate: 3.75 },
    MYR: { name: "Malaysian Ringgit", rate: 4.7 },
    TRY: { name: "Turkish Lira", rate: 32.0 },
    BND: { name: "Brunei Dollar", rate: 1.35 },
    MAD: { name: "Moroccan Dirham", rate: 10.0 },
    DZD: { name: "Algerian Dinar", rate: 135.0 },
    TND: { name: "Tunisian Dinar", rate: 3.1 },
    LYD: { name: "Libyan Dinar", rate: 4.9 },
    EGP: { name: "Egyptian Pound", rate: 48.5 },
    AOA: { name: "Angolan Kwanza", rate: 825.0 },
    RUB: { name: "Russian Ruble", rate: 75.0 },
    KZT: { name: "Kazakhstani Tenge", rate: 470.0 },
};

// Dropdowns
const fromSelect = document.getElementById("fromCurrency");
const toSelect = document.getElementById("toCurrency");

// Populate dropdowns
for (let code in currencies) {

    let option1 = document.createElement("option");
    option1.value = code;
    option1.textContent = `${code} - ${currencies[code].name}`;
    fromSelect.appendChild(option1);

    let option2 = document.createElement("option");
    option2.value = code;
    option2.textContent = `${code} - ${currencies[code].name}`;
    toSelect.appendChild(option2);
}

// Default values
fromSelect.value = "USD";
toSelect.value = "AED";

// Convert function
function convert() {
    let amount = document.getElementById("amount").value;
    let from = fromSelect.value;
    let to = toSelect.value;

    if (amount === "" || amount <= 0) {
        document.getElementById("result").innerHTML = "Enter valid amount";
        return;
    }

    let usd = amount / currencies[from].rate;
    let converted = usd * currencies[to].rate;

    document.getElementById("result").innerHTML =
        `${amount} ${from} = ${converted.toFixed(2)} ${to}`;
}

</script>

</body>
</html>
