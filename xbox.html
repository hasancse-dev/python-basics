<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap Grid with Icons</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .card:hover {
            transform: scale(1.05);
            transition: 0.3s ease;
        }

        footer {
            background-color: #212529;
            color: white;
            padding: 20px 0;
            margin-top: 40px;
            text-align: center;
        }

        .icon-large {
            font-size: 50px;
            color: #107C10; /* Xbox Green */
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="bi bi-xbox"></i> POWER YOUR DREAMS
        </a>
    </div>
</nav>

<!-- GRID SECTION -->
<div class="container mt-5">
    <div class="row text-center">

        <!-- Column 1 -->
        <div class="col-md-4 mb-4">
            <div class="card p-4 shadow">
                <i class="bi bi-xbox icon-large"></i>
                <h4 class="mt-3">Xbox Series X</h4>
                <p>Powerful next-gen console with stunning graphics.</p>
            </div>
        </div>

        <!-- Column 2 -->
        <div class="col-md-4 mb-4">
            <div class="card p-4 shadow">
                <i class="bi bi-controller icon-large"></i>
                <h4 class="mt-3">Gaming Controller</h4>
                <p>Ergonomic design with immersive experience.</p>
            </div>
        </div>

        <!-- Column 3 -->
        <div class="col-md-4 mb-4">
            <div class="card p-4 shadow">
                <i class="bi bi-headset icon-large"></i>
                <h4 class="mt-3">Gaming Headset</h4>
                <p>Crystal clear sound and noise cancellation.</p>
            </div>
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer>
    <div class="container">
        <p>© 2026 Hashemi InfoTech is a unit of HH Interactive</p>
        <p>Built using Bootstrap Grid & Icons</p>
    </div>
</footer>

</body>
</html>
